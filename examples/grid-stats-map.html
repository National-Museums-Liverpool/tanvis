<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tanvis Grid Stats Mock Example</title>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      .tanvis {
        margin-top: 1rem;
      }

      pre {
        padding: 1rem;
        background: #f4f4f4;
        border-radius: 6px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Tanvis Grid Stats Mock Example</h1>
    <p>This fetches <code>grid-square-stats</code> data and logs the retrieved rows to the console.</p>

    <div
      class="tanvis"
      data-vis-type="grid-stats-map"
      data-vis-map-type="static"
      data-vis-area="vc-60"
      data-vis-width="600"
      data-vis-height="600"
      data-vis-expand="false"
      data-vis-boundaries="true"
    ></div>

    <script src="../dist/tanvis.iife.js"></script>
    <script type="module">
      import { installGridStatsMockApi } from './mock/gridStatsMockApi.js';

      installGridStatsMockApi({ baseUrl: '/api', latencyMs: 150 });
      window.Tanvis.init();
    </script>
  </body>
</html>
