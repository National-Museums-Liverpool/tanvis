<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tanvis Increasing Species Table Example</title>
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      .tanvis {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Tanvis Increasing Species Table Example</h1>
    <p>This renders the top increasing species ranked by frequency trend score.</p>

    <div
      id="vc-control"
      class="tanvis"
      data-vis-type="control-block"
      data-vis-area="vc-58-59-60"
    ></div>

    <div
      id="my-increasing-species-table"
      class="tanvis"
      data-vis-type="increasing-species-table"
      data-vis-top-n="25"
      data-vis-control="vc-control"
    ></div>

    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script src="../dist/tanvis.iife.js"></script>
    <script type="module">
      import { installTaxonGroupsMockApi } from './mock/taxonGroupsMockApi.js';
      import { installSpeciesStatsMockApi } from './mock/speciesStatsMockApi.js';

      installTaxonGroupsMockApi({ baseUrl: '/api', latencyMs: 150 });
      installSpeciesStatsMockApi({ baseUrl: '/api', latencyMs: 150 });
      
      window.Tanvis.init();

      document.addEventListener("species-row-selected", function(e) {
        console.log(`Row clicked:`, e.detail);
      });
    </script>
  </body>
</html>
