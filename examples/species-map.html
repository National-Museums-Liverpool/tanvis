<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tanvis Species Map Example</title>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      .tanvis {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Tanvis Species Map Example</h1>
    <p>This renders a species map using the shared map backend.</p>

    <div
      id="vc-control"
      class="tanvis"
      data-vis-type="control-block"
      data-vis-area="vc-58-59-60"
    ></div>

    <div
      class="tanvis"
      data-vis-type="species-map"
      data-vis-species="NHMSYS0000001001"
      data-vis-year="2024"
      data-vis-map-type="leaflet"
      data-vis-control="vc-control"
    ></div>

    <script src="../dist/tanvis.iife.js"></script>
    <script type="module">
      import { installSpeciesAbsentSinceMockApi } from './mock/speciesAbsentSinceMockApi.js';
      import { installTaxonGroupsMockApi } from './mock/taxonGroupsMockApi.js';

      installTaxonGroupsMockApi({ baseUrl: '/api', latencyMs: 150 });
      installSpeciesAbsentSinceMockApi({ baseUrl: '/api', latencyMs: 150 });
      window.Tanvis.init();
    </script>
  </body>
</html>
