<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tanvis Slippy Map Example</title>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/biologicalrecordscentre/brc-atlas/dist/brcatlas.umd.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .tanvis {
        /* width: 100%; */
        /* height: 800px; */
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Tanvis Slippy Map Renderer Example</h1>
    <p>This renders a Leaflet/slippy map using Tanvis and the BRC Atlas library.</p>

    <div
      class="tanvis"
      data-vis-type="slippy-map"
      data-vis-area="vc-58"
      data-vis-width="600"
      data-vis-height="600"
      data-vis-expand="true"
      data-vis-boundaries="true"
      data-vis-ctl="true"
    ></div>

    <script src="../dist/tanvis.iife.js"></script>
    <script>
      window.Tanvis.init();
    </script>
  </body>
</html>
